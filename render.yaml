services:
  - type: web
    name: ai-web-automation
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
    startCommand: uvicorn server.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_SHEETS_ID
        sync: false
      - key: WHATSAPP_MODE
        value: meta_cloud
      - key: META_PHONE_NUMBER_ID
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: COMPANY_NAME
        sync: false
      - key: AGENT_NAME
        sync: false
      - key: PORTFOLIO_URL
        sync: false
      - key: UPI_ID
        sync: false
      - key: TARGET_CITIES
        value: Delhi,Mumbai,Pune
      - key: BUSINESS_TYPES
        value: Restaurant,Clinic,Salon,Gym,Retail
      - key: SCRAPE_SCHEDULE_HOUR
        value: "10"
      - key: MAX_COLD_MESSAGES_PER_DAY
        value: "12"
      - key: SKIP_PLAYWRIGHT_SCRAPING
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.2"

